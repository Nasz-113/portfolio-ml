<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volleyball Position Predictor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      text-align: center;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    input[type="number"]::-webkit-inner-spin-button { opacity: 1; }

    button {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1.5rem;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #0284c7; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .url-field {
      margin-bottom: 1.5rem;
    }

    .url-field input {
      font-size: 0.8rem;
      padding: 0.5rem 0.6rem;
    }

    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .result.show { display: block; }
    .result.success { border-color: #22c55e; }
    .result.error   { border-color: #ef4444; }

    .result .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .result .value { font-size: 1.75rem; font-weight: 700; margin-top: 0.25rem; }
    .result.success .value { color: #4ade80; }
    .result.error .value   { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Volleyball Position Predictor</h1>
    <p class="subtitle">Enter per-match stats to predict playing position</p>

    <div class="url-field">
      <label for="apiUrl">API URL</label>
      <input type="text" id="apiUrl" value="http://localhost:8000/predict" />
    </div>

    <div class="field">
      <label for="sets">Sets Per Match</label>
      <input type="number" id="sets" step="any" min="0" placeholder="e.g. 25" value="25" />
    </div>

    <div class="field">
      <label for="receives">Receives Per Match</label>
      <input type="number" id="receives" step="any" min="0" placeholder="e.g. 15" value="15" />
    </div>

    <div class="field">
      <label for="blocks">Blocks Per Match</label>
      <input type="number" id="blocks" step="any" min="0" placeholder="e.g. 3" value="3" />
    </div>

    <div class="field">
      <label for="digs">Digs Per Match</label>
      <input type="number" id="digs" step="any" min="0" placeholder="e.g. 8" value="8" />
    </div>

    <div class="field">
      <label for="attacks">Attacks Per Match</label>
      <input type="number" id="attacks" step="any" min="0" placeholder="e.g. 12" value="12" />
    </div>

    <button id="predictBtn" type="button">Predict Position</button>

    <div class="result" id="result">
      <div class="label">Predicted Position</div>
      <div class="value" id="resultValue"></div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('predictBtn');
    const resultDiv = document.getElementById('result');
    const resultValue = document.getElementById('resultValue');

    btn.addEventListener('click', async () => {
      const body = {
        sets_per_match: parseFloat(document.getElementById('sets').value) || 0,
        receives_per_match: parseFloat(document.getElementById('receives').value) || 0,
        blocks_per_match: parseFloat(document.getElementById('blocks').value) || 0,
        digs_per_match: parseFloat(document.getElementById('digs').value) || 0,
        attacks_per_match: parseFloat(document.getElementById('attacks').value) || 0,
      };

      const apiUrl = document.getElementById('apiUrl').value.trim();
      btn.disabled = true;
      btn.textContent = 'Loading...';
      resultDiv.className = 'result';
      resultDiv.style.display = 'none';

      try {
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        resultValue.textContent = data.position;
        resultDiv.className = 'result show success';
        resultDiv.style.display = 'block';
      } catch (err) {
        resultValue.textContent = err.message;
        resultDiv.className = 'result show error';
        resultDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Predict Position';
      }
    });
  </script>
</body>
</html>
